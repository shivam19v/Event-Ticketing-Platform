---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: eventsphere
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None   # headless for StatefulSet DNS
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: eventsphere
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: eventsphere
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: eventsphere
spec:
  selector:
    app: user-service
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: event-service
  namespace: eventsphere
spec:
  selector:
    app: event-service
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: eventsphere
spec:
  selector:
    app: booking-service
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: eventsphere
spec:
  selector:
    app: payment-service
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: ticket-service
  namespace: eventsphere
spec:
  selector:
    app: ticket-service
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: eventsphere
spec:
  selector:
    app: notification-service
  ports:
    - port: 8080
      targetPort: 8080
---
# API Gateway exposed via LoadBalancer (or use Ingress in production)
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: eventsphere
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8000
