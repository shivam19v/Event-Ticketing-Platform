apiVersion: v1
kind: ConfigMap
metadata:
  name: eventsphere-config
  namespace: eventsphere
data:
  SPRING_DATASOURCE_USERNAME: "appuser"
  SPRING_REDIS_HOST: "redis-service"
  SPRING_REDIS_PORT: "6379"
  SPRING_RABBITMQ_HOST: "rabbitmq-service"
  SPRING_RABBITMQ_PORT: "5672"
  SPRING_RABBITMQ_USERNAME: "guest"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq-service:5672/"
  USER_SERVICE_URL: "http://user-service:8080"
  EVENT_SERVICE_URL: "http://event-service:8080"
  BOOKING_SERVICE_URL: "http://booking-service:8080"
  PAYMENT_SERVICE_URL: "http://payment-service:8080"
  TICKET_SERVICE_URL: "http://ticket-service:8080"
  CORS_ORIGIN: "https://eventsphere.yourdomain.com"
  FROM_EMAIL: "noreply@eventsphere.yourdomain.com"
  PORT: "8080"
