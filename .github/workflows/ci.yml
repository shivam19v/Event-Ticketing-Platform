name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/eventsphere

jobs:
  # ── Java services ────────────────────────────────────────────────────────────
  test-java:
    name: Test Java Services
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: eventsphere_test
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    strategy:
      matrix:
        service: [user-service, event-service, booking-service, ticket-service, notification-service]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests for ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/eventsphere_test
          SPRING_DATASOURCE_USERNAME: appuser
          SPRING_DATASOURCE_PASSWORD: testpass
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379
          JWT_SECRET: test-secret-key-for-ci-min-32-chars
        run: mvn test -q

  # ── Go services ──────────────────────────────────────────────────────────────
  test-go:
    name: Test Go Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, payment-service]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go 1.21
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: ${{ matrix.service }}/go.sum

      - name: Vet & test ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: |
          go vet ./...
          go test ./... -v -timeout 30s

  # ── Frontend ─────────────────────────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - run: npm install --legacy-peer-deps
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

  # ── Build & push Docker images ───────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-java, test-go, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    strategy:
      matrix:
        include:
          - service: user-service
            context: ./user-service
          - service: event-service
            context: ./event-service
          - service: booking-service
            context: ./booking-service
          - service: ticket-service
            context: ./ticket-service
          - service: notification-service
            context: ./notification-service
          - service: payment-service
            context: ./payment-service
          - service: api-gateway
            context: ./api-gateway
          - service: frontend
            context: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Kubernetes ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Create namespace if missing
        run: kubectl create namespace eventsphere --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply ConfigMap and Secrets
        run: |
          kubectl apply -f kubernetes/configmaps/
          kubectl apply -f kubernetes/secrets/

      - name: Apply infrastructure
        run: kubectl apply -f kubernetes/deployments/infrastructure.yaml

      - name: Wait for infrastructure
        run: |
          kubectl rollout status statefulset/postgres -n eventsphere --timeout=120s
          kubectl rollout status deployment/redis -n eventsphere --timeout=60s
          kubectl rollout status deployment/rabbitmq -n eventsphere --timeout=60s

      - name: Update microservice images to new SHA
        run: |
          SERVICES="user-service event-service booking-service payment-service ticket-service notification-service api-gateway"
          for svc in $SERVICES; do
            kubectl set image deployment/$svc \
              $svc=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-$svc:${{ github.sha }} \
              -n eventsphere
          done

      - name: Apply services manifest
        run: kubectl apply -f kubernetes/services/services.yaml

      - name: Verify rollouts
        run: |
          SERVICES="user-service event-service booking-service payment-service ticket-service notification-service api-gateway"
          for svc in $SERVICES; do
            kubectl rollout status deployment/$svc -n eventsphere --timeout=180s
          done
          echo "✅ All services deployed successfully"
